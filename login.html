<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admas University Library</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-bg"></body>
<body>
    <!-- Navigation (same as index) -->
</div>
        <div class="container">
            <div class="logo">
                <i class="fas fa-book"></i>
                <h1>Admas Digital Library</h1>
            </div>
<ul class="nav-links">
    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
    <li><a href="about.html"><i class="fas fa-info-circle"></i> About Us</a></li>
    <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
    <li><a href="register.html"><i class="fas fa-user-plus"></i> Register</a></li>
</ul>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-header">
                    <h1><i class="fas fa-sign-in-alt"></i> Member Login</h1>
                    <p>Access your library account</p>
                </div>
                
                <div class="auth-content">
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                            <input type="email" id="email" placeholder="student@admas.edu.et" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password"><i class="fas fa-lock"></i> Password</label>
                            <div class="password-input">
                                <input type="password" id="password" placeholder="Enter your password" required>
                                <button type="button" class="toggle-password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox"> Remember me
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="btn-login">
                            <i class="fas fa-sign-in-alt"></i> Login to Account
                        </button>
                    </form>
                    
                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html">Register here</a></p>
                        <p>Are you a librarian? <a href="#">Admin login</a></p>
                        <!-- In login.html, add this after the auth-footer -->
<div class="admin-link">
    <a href="admin-login.html">
        <i class="fas fa-user-shield"></i> Administrator Login
    </a>
</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/auth.js"></script>
    <!-- Add this BEFORE other script tags -->
<script src="js/common.js"></script>
<script src="js/script.js"></script> <!-- or js/auth.js as needed -->
</body>
</html>
